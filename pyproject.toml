[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"

[tool.ruff]
target-version = "py310"
exclude = [
    ".git",
    ".venv",
    "build",
    "dist",
    "core/generated",
]

[tool.ruff.lint]
# Conservative correctness checks only. Formatting and style enforcement are
# intentionally outside Engineering Infrastructure Phase 1.
select = ["E9", "F63", "F7", "F82"]

[tool.coverage.run]
branch = true
source = ["."]
omit = [
    "build/*",
    "core/generated/*",
    "scripts/*",
    "tests/*",
]

[tool.coverage.report]
show_missing = true
skip_empty = true
precision = 1

[tool.coverage.xml]
output = "coverage.xml"
